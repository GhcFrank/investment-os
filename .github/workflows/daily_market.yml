name: Daily Market Update

on:
  workflow_dispatch:

  schedule:
    # GitHub Actions 使用 UTC 时间。
    # 21:30 UTC 在美国夏令时期间约等于美东 17:30。
    # 1-5 表示周一到周五运行。
    - cron: "30 21 * * 1-5"

jobs:
  run-market-update:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set Up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Daily Pipeline
        run: |
          PYTHONPATH=src python src/pipelines/run_daily_pipeline.py
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          SENTIMENT_USER_AGENT: InvestmentOS-SentimentBot/1.0
          # Example secret value format: InvestmentOS contact@example.com
          SEC_USER_AGENT: ${{ secrets.SEC_USER_AGENT }}

      - name: Commit Updated Data
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add data/market_data/prices.csv
          git add data/market_data/prices_history.csv
          git add data/market_data/vix.csv
          git add data/market_data/vix_history.csv
          git add data/market_data/cnn_fear_greed.csv
          git add data/market_data/cnn_fear_greed_history.csv
          git add data/market_data/sentiment_fetch_log.csv
          git add data/signals/sector_strength.csv
          git add data/signals/sector_strength_history.csv
          git add data/signals/daily_market_signals.csv
          git add data/events/earnings_calendar.csv
          git add data/events/earnings_alert_history.csv
          git add data/events/ir_events.csv

          for file in \
            data/events/sec_company_map.csv \
            data/events/sec_filings.csv \
            data/events/sec_alert_history.csv \
            data/events/sec_initialized.flag
          do
            if [ -f "$file" ]; then
              git add "$file"
            fi
          done

          git add data/prediction_markets/polymarket_earnings_markets.csv
          git add data/prediction_markets/polymarket_earnings_watchlist.csv
          git add data/prediction_markets/polymarket_predictions.csv
          git add data/prediction_markets/polymarket_predictions_history.csv

          git commit -m "Update daily market data" || echo "No changes to commit"
          git push
