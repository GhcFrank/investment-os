name: Weekly News Discovery

on:
  workflow_dispatch:

  schedule:
    # GitHub Actions cron uses UTC. Saturday 02:00 UTC is NYC Friday evening
    # during both EDT (10 PM Friday) and EST (9 PM Friday).
    - cron: "0 2 * * 6"

permissions:
  contents: write

concurrency:
  group: weekly-news-discovery
  cancel-in-progress: false

jobs:
  run-weekly-news-discovery:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set Up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run News Tests
        run: |
          PYTHONPATH=src python -m unittest discover -s tests/news -v

      - name: Run Weekly News Discovery
        run: |
          PYTHONPATH=src python src/news/fetch_semiengineering_news.py --lookback-days 7
        env:
          NEWS_USER_AGENT: InvestmentOS-NewsBot/1.0

      - name: Send Weekly News Email
        run: |
          PYTHONPATH=src python src/news/send_weekly_news_email.py
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}

      - name: Commit News Updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add data/news/*.csv data/news/reference/*.csv

          if git diff --cached --quiet; then
            echo "No news updates to commit."
          else
            git commit -m "Update weekly news discovery"
            git pull --rebase origin "$GITHUB_REF_NAME"
            git push
          fi
